name: Build Executables

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean --windowed --name WBSSender main.py

      - name: Copy runtime folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "runtime") {
            Remove-Item -Recurse -Force "dist/WBSSender/runtime" -ErrorAction SilentlyContinue
            Copy-Item -Recurse -Force "runtime" "dist/WBSSender/runtime"
            Write-Host "Runtime folder copied."
          } else {
            Write-Host "No runtime folder found. Skipping."
          }

      - name: Copy runtime folder (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ -d "runtime" ]; then
            rm -rf dist/WBSSender/runtime
            cp -r runtime dist/WBSSender/runtime
            echo "Runtime folder copied."
          else
            echo "No runtime folder found. Skipping."
          fi

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: WBSSender-windows
          path: dist/WBSSender/

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: WBSSender-linux
          path: dist/WBSSender/
